<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Click each button to download the PNG icon.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;display:block;margin:10px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;display:block;margin:10px"></canvas>
<button onclick="gen(192)">Download icon-192.png</button>
<button onclick="gen(512)">Download icon-512.png</button>

<script>
function gen(size) {
  const canvas = document.getElementById('c' + size);
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = function() {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    const a = document.createElement('a');
    a.download = 'icon-' + size + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = 'icon.svg';
}
// Auto-render previews
window.onload = function() {
  [192, 512].forEach(size => {
    const canvas = document.getElementById('c' + size);
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, size, size);
    img.src = 'icon.svg';
  });
};
</script>
</body>
</html>
