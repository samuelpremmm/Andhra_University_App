<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#200505"/>

  <!-- LEFT COBRA hood -->
  <ellipse cx="118" cy="90" rx="105" ry="58" fill="#2d6b1a" transform="rotate(-22 118 90)"/>
  <ellipse cx="135" cy="105" rx="58" ry="35" fill="#1d4d12" transform="rotate(-18 135 105)"/>
  <!-- Left body -->
  <path d="M165,150 C138,195 120,255 118,315 C116,375 128,425 148,465 C162,495 182,510 200,518"
        fill="none" stroke="#2d6b1a" stroke-width="46" stroke-linecap="round"/>
  <!-- Left eye -->
  <circle cx="170" cy="88" r="16" fill="#fde68a"/>
  <circle cx="175" cy="91" r="8" fill="#111"/>
  <!-- Left tongue -->
  <path d="M192,120 L218,148 M218,148 L230,138 M218,148 L230,158" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>

  <!-- RIGHT COBRA hood -->
  <ellipse cx="394" cy="90" rx="105" ry="58" fill="#2d6b1a" transform="rotate(22 394 90)"/>
  <ellipse cx="377" cy="105" rx="58" ry="35" fill="#1d4d12" transform="rotate(18 377 105)"/>
  <!-- Right body -->
  <path d="M347,150 C374,195 392,255 394,315 C396,375 384,425 364,465 C350,495 330,510 312,518"
        fill="none" stroke="#2d6b1a" stroke-width="46" stroke-linecap="round"/>
  <!-- Right eye -->
  <circle cx="342" cy="88" r="16" fill="#fde68a"/>
  <circle cx="337" cy="91" r="8" fill="#111"/>
  <!-- Right tongue -->
  <path d="M320,120 L294,148 M294,148 L282,138 M294,148 L282,158" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>

  <!-- Central red circle -->
  <circle cx="256" cy="295" r="162" fill="#cc1818"/>
  <circle cx="256" cy="295" r="162" fill="none" stroke="#d4a017" stroke-width="13"/>
  <circle cx="256" cy="295" r="148" fill="none" stroke="#d4a017" stroke-width="3"/>

  <!-- Lotus outer petals (8, cream) -->
  <g transform="translate(256,295)">
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f8f5ee"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f3efe6" transform="rotate(45)"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f8f5ee" transform="rotate(90)"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f3efe6" transform="rotate(135)"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f8f5ee" transform="rotate(180)"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f3efe6" transform="rotate(225)"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f8f5ee" transform="rotate(270)"/>
    <ellipse cx="0" cy="-78" rx="26" ry="62" fill="#f3efe6" transform="rotate(315)"/>
    <!-- Inner petals (8, pink) -->
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(22.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(67.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-48" rx="18" ry="40" fill="#fce8e8" transform="rotate(337.5)"/>
    <!-- Gold center -->
    <circle cx="0" cy="0" r="42" fill="#d4a017"/>
    <circle cx="0" cy="0" r="32" fill="#eab308"/>
    <circle cx="0" cy="0" r="18" fill="#fde68a"/>
  </g>

  <!-- Swastika (Hindu clockwise) at top of circle -->
  <g transform="translate(256,168) scale(3.2)" fill="#fde68a">
    <rect x="-1.5" y="-7" width="3" height="14"/>
    <rect x="-7" y="-1.5" width="14" height="3"/>
    <rect x="1.5" y="-7" width="5.5" height="3"/>
    <rect x="4" y="1.5" width="3" height="5.5"/>
    <rect x="-7" y="4" width="5.5" height="3"/>
    <rect x="-7" y="-7" width="3" height="5.5"/>
  </g>

  <!-- AU text -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="52" fill="#200505" letter-spacing="4">AU</text>

  <!-- Telugu text at bottom -->
  <text x="256" y="500" text-anchor="middle" font-family="serif" font-size="28" fill="#fde68a" font-weight="bold">ఆంధ్ర విశ్వవిద్యాలయం</text>
</svg>
