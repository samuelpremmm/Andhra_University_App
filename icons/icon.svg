<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0303"/>
      <stop offset="100%" stop-color="#3d0808"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer hex ring -->
  <polygon points="256,36 468,152 468,384 256,500 44,384 44,152"
           fill="none" stroke="url(#goldGrad)" stroke-width="10" opacity="0.65"/>
  <!-- Inner hex fill -->
  <polygon points="256,72 432,168 432,344 256,440 80,344 80,168"
           fill="rgba(202,138,4,0.07)"/>

  <!-- Book body -->
  <rect x="88" y="296" width="336" height="168" rx="18" fill="url(#goldGrad)"/>
  <!-- Left page -->
  <rect x="98" y="308" width="152" height="144" rx="12" fill="#fef9c3"/>
  <!-- Right page -->
  <rect x="262" y="308" width="152" height="144" rx="12" fill="#fde68a"/>
  <!-- Spine -->
  <rect x="246" y="308" width="20" height="144" fill="url(#goldGrad)"/>
  <!-- Left page lines -->
  <line x1="116" y1="346" x2="236" y2="346" stroke="#8b1a1a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <line x1="116" y1="376" x2="236" y2="376" stroke="#8b1a1a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <line x1="116" y1="406" x2="236" y2="406" stroke="#8b1a1a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <!-- Right page lines -->
  <line x1="276" y1="346" x2="396" y2="346" stroke="#8b1a1a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <line x1="276" y1="376" x2="396" y2="376" stroke="#8b1a1a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <line x1="276" y1="406" x2="396" y2="406" stroke="#8b1a1a" stroke-width="9" stroke-linecap="round" opacity="0.45"/>

  <!-- Graduation cap base (mortarboard) -->
  <polygon points="256,100 420,184 256,268 92,184" fill="url(#goldGrad)"/>
  <!-- Cap top (flat board) -->
  <polygon points="256,100 420,184 256,184 92,184" fill="#ca8a04" opacity="0.3"/>
  <!-- Tassel string -->
  <rect x="400" y="184" width="18" height="82" rx="9" fill="url(#goldGrad)"/>
  <!-- Tassel end -->
  <circle cx="409" cy="278" r="22" fill="#eab308"/>
  <line x1="409" y1="278" x2="395" y2="308" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <line x1="409" y1="278" x2="409" y2="312" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <line x1="409" y1="278" x2="423" y2="308" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>

  <!-- AU monogram on cap -->
  <text x="256" y="218"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="900"
        fill="#1a0303"
        letter-spacing="-1">AU</text>
</svg>
